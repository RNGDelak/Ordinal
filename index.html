<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Transfinite Number Line</title>
<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #111;
    color: white;
    font-family: monospace;
    touch-action: none;
}

canvas { display: block; }

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    padding: 10px 14px;
    border-radius: 8px;
    z-index: 10;
}
</style>
</head>
<body>

<div id="ui">
  <div>Zoom: <span id="zoomDisplay"></span></div>
  <div>FPS: <span id="fpsDisplay"></span></div>
  <div>World Position: <span id="worldDisplay"></span></div>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// =====================
// STATE
// =====================
let zoom = new Decimal(1000);
let offsetX = new Decimal(0);

let isInteracting = false;
let renderVersion = 0;
let idleTimeout = null;

// =====================
// COORDINATES
// =====================
function worldToScreen(x) {
    return x.plus(offsetX)
            .times(zoom)
            .plus(canvas.width / 2)
            .toNumber();
}

function screenToWorld(x) {
    return new Decimal(x)
        .minus(canvas.width / 2)
        .div(zoom)
        .minus(offsetX);
}

// =====================
// INTERACTION CONTROL
// =====================
function startInteraction() {
    isInteracting = true;
    renderVersion++;
    if (idleTimeout) clearTimeout(idleTimeout);
}

function endInteraction() {
    isInteracting = false;

    idleTimeout = setTimeout(() => {
        startRender();
    }, 120);
}

// =====================
// MOUSE
// =====================
let mouseDown = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", e => {
    mouseDown = true;
    lastX = e.clientX;
    lastY = e.clientY;
    startInteraction();
});

window.addEventListener("mouseup", () => {
    if(mouseDown){
        mouseDown = false;
        endInteraction();
    }
});

window.addEventListener("mousemove", e => {
    if (!mouseDown) return;

    const dx = new Decimal(e.clientX - lastX);
    const dy = new Decimal(e.clientY - lastY);

    lastX = e.clientX;
    lastY = e.clientY;

    offsetX = offsetX.plus(dx.div(zoom));

    const zoomFactor = new Decimal(1).plus(dy.neg().times(0.005));
    const centerScreen = new Decimal(canvas.width / 2);
    const centerWorld = screenToWorld(centerScreen);

    zoom = zoom.times(zoomFactor);
    if (zoom.lte(0)) zoom = new Decimal(1);

    offsetX = offsetX.plus(centerWorld.minus(screenToWorld(centerScreen)));
});

// =====================
// PREVIEW RENDER (50 STEPS)
// =====================
function renderPreview(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxis();

    const worldLeft = screenToWorld(0);
    const worldRight = screenToWorld(canvas.width);

    const start = Decimal.max(new Decimal(1), worldLeft);
    const end = worldRight;

    if (end.lte(start)) return;

    const steps = 50;
    let lastOrdinal = null;

    for (let step = 0; step <= steps; step++) {

        const ratio = new Decimal(step).div(steps);
        const x = start.plus(end.minus(start).mul(ratio));
        const ordinal = getordinal(x);

        if (!arraysEqual(lastOrdinal, ordinal)) {

            const pos = getpoint(ordinal);
            const sx = worldToScreen(pos);

            if (sx > -50 && sx < canvas.width + 50) {
                drawOrdinalTick(ordinal, sx);
            }

            lastOrdinal = ordinal;
        }
    }
}

// =====================
// FULL RENDER
// =====================
function startRender(){

    renderVersion++;
    const currentVersion = renderVersion;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawAxis();

    const worldLeft = screenToWorld(0);
    const worldRight = screenToWorld(canvas.width);

    const start = Decimal.max(new Decimal(1), worldLeft);
    const end = worldRight;

    if (end.lte(start)) return;

    const totalSteps = Math.floor(canvas.width);
    let step = 0;
    let lastOrdinal = null;

    function processChunk(){

        if (currentVersion !== renderVersion) return;
        if (isInteracting) return;

        const chunkSize = Math.floor(totalSteps/25);

        for (let i = 0; i < chunkSize && step <= totalSteps; i++, step++) {

            const ratio = new Decimal(step).div(totalSteps);
            const x = start.plus(end.minus(start).mul(ratio));
            const ordinal = getordinal(x);

            if (!arraysEqual(lastOrdinal, ordinal)) {

                const pos = getpoint(ordinal);
                const sx = worldToScreen(pos);

                if (sx > -50 && sx < canvas.width + 50) {
                    drawOrdinalTick(ordinal, sx);
                }

                lastOrdinal = ordinal;
            }
        }

        if (step <= totalSteps) {
            requestAnimationFrame(processChunk);
        }
    }

    processChunk();
}

// =====================
// ORDINAL ENGINE
// =====================
function getEpsilon() {
  return Decimal.pow(10, -Decimal.precision + 4);
}

function getordinal(xInput) {
  let x = new Decimal(xInput);
  if (x.lte(0)) return [new Decimal(0)];

  const ln3 = new Decimal(3).ln();
  let dimension = x.ln().div(ln3).floor().toNumber();

  let coefficient = Array(dimension + 1)
    .fill(null)
    .map(() => new Decimal(0));

  for (let i = dimension; i >= 0; i--) {
    const pow3 = new Decimal(3).pow(i + 1);
    const inside = new Decimal(1).minus(x.div(pow3));

    const k = inside.ln()
      .div(new Decimal(2).div(3).ln())
      .plus(getEpsilon())
      .floor();

    coefficient[i] = k;

    const Lk = pow3.mul(
      new Decimal(1).minus(
        new Decimal(2).div(3).pow(k)
      )
    );

    x = x.minus(Lk).mul(
      new Decimal(3).div(2).pow(k)
    );
  }

  return coefficient;
}

function getpoint(coeff) {
  let x = new Decimal(0);

  for (let i = 0; i < coeff.length; i++) {
    const k = new Decimal(coeff[i]);
    const pow3 = new Decimal(3).pow(i + 1);

    const Lk = pow3.mul(
      new Decimal(1).minus(
        new Decimal(2).div(3).pow(k)
      )
    );

    x = x.mul(new Decimal(2).div(3).pow(k)).plus(Lk);
  }
  return x;
}

function arraysEqual(a,b){
  if(!a||!b||a.length!==b.length) return false;
  for(let i=0;i<a.length;i++)
    if(!new Decimal(a[i]).eq(b[i])) return false;
  return true;
}

function toOrdinal(coeff){
  let parts=[];
  for(let i=coeff.length-1;i>=0;i--){
    const k=coeff[i];
    if(!k.eq(0)){
      if(i===0) parts.push(k.toString());
      else if(i===1) parts.push(k.eq(1)?"ω":k+"ω");
      else parts.push(k.eq(1)?"ω^"+i:k+"ω^"+i);
    }
  }
  return parts.length?parts.join(" + "):"0";
}

function classifyOrdinal(coeff){
    let nonZeroCount = 0;
    let nonZeroIndex = -1;

    for(let i=0;i<coeff.length;i++){
        if(!coeff[i].eq(0)){
            nonZeroCount++;
            nonZeroIndex = i;
        }
    }

    if(nonZeroCount === 0) return "zero";
    if(nonZeroCount === 1 && nonZeroIndex !== 0) return "omegaPower";
    if(!coeff[0].eq(0)) return "successor";
    return "limit";
}

function drawOrdinalTick(ord, sx){

    const type = classifyOrdinal(ord);

    let color = "white";
    if(type === "zero") color = "#00ffff";
    if(type === "limit") color = "orange";
    if(type === "omegaPower") color = "yellow";

    const midY = canvas.height / 2;

    ctx.strokeStyle = color;
    ctx.fillStyle = color;

    ctx.beginPath();
    ctx.moveTo(sx, midY - 10);
    ctx.lineTo(sx, midY + 10);
    ctx.stroke();

    ctx.fillText(toOrdinal(ord), sx, midY + 18);
}

function drawAxis(){
    const midY = canvas.height/2;

    ctx.strokeStyle="white";
    ctx.beginPath();
    ctx.moveTo(0,midY);
    ctx.lineTo(canvas.width,midY);
    ctx.stroke();

    const zeroX=worldToScreen(new Decimal(0));
    ctx.strokeStyle="#00ffff";
    ctx.beginPath();
    ctx.moveTo(zeroX,midY-15);
    ctx.lineTo(zeroX,midY+15);
    ctx.stroke();
    ctx.fillText("0",zeroX,midY+20);
}

// =====================
// MAIN LOOP
// =====================
let fps=0,lastTime=performance.now(),frames=0;

function loop(){

    frames++;
    const now=performance.now();
    if(now-lastTime>=1000){
        fps=frames;
        frames=0;
        lastTime=now;
    }

    document.getElementById("zoomDisplay").textContent = zoom.toPrecision(6);
    document.getElementById("fpsDisplay").textContent = fps;

    const centerWorld = screenToWorld(canvas.width/2);
    document.getElementById("worldDisplay").textContent =
        centerWorld.toPrecision(10);

    if(isInteracting){
        renderPreview(); // clears every frame while dragging
    }

    requestAnimationFrame(loop);
}

loop();
startRender();

</script>
</body>
</html>
